<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Remnant Orvex Capital</title>
<link rel="stylesheet" href="/client/styles.css">
<script defer src="/client/reset-password.js"></script>
</head>
<body>
<div class="shell">
  <section class="hero">
    <h1>Create a new password</h1>
    <p>The reset token is kept in the URL fragment and posted to the API only when you submit the form.</p>
  </section>

  <main class="content">
    <section class="card stack">
      <form id="reset-form" class="stack" novalidate>
        <div class="field">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" minlength="12" maxlength="128" autocomplete="new-password" required>
          <div class="hint">Use at least 12 characters with uppercase, lowercase, number, and special character.</div>
        </div>

        <div class="field">
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" name="confirm_password" type="password" minlength="12" maxlength="128" autocomplete="new-password" required>
        </div>

        <button id="reset-button" type="submit">Reset password</button>
        <div id="reset-status" class="status" data-tone="muted" aria-live="polite">Enter your new password.</div>
      </form>
    </section>
  </main>
</div>
</body>
</html>
